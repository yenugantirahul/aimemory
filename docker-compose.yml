services:
  postgres:
    image: postgres:17

    container_name: memai

    restart: unless-stopped

    environment:
      POSTGRES_USER: rahul
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mem0

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: